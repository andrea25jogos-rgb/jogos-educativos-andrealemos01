<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Desafio de Português - Ranking</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #info-bar { width: 100%; background: #1e293b; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 4px solid #3b82f6; }
        #game-container { position: relative; width: 800px; height: 500px; background: #000; border: 5px solid #334155; border-radius: 15px; margin-top: 20px; overflow: hidden; }
        #player { position: absolute; width: 40px; height: 40px; background: #3b82f6; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 10; box-shadow: 0 0 15px #3b82f6; }
        .letter { position: absolute; width: 45px; height: 45px; background: #f43f5e; color: white; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; border-radius: 50%; transition: all 0.3s ease-out; }
        #word-display { font-size: 40px; color: #10b981; letter-spacing: 10px; font-weight: bold; }
        #timer { font-size: 24px; font-family: monospace; color: #f59e0b; }
        .wrong { background: #ff0000 !important; transform: scale(1.3); }
        #ranking-container { display: none; text-align: center; background: #1e293b; padding: 30px; border-radius: 20px; margin-top: 20px; width: 450px; border: 2px solid #f59e0b; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; }
        .btn-green { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #10b981; border: none; color: white; border-radius: 5px; margin: 5px; }
        .btn-red { padding: 8px 15px; font-size: 14px; cursor: pointer; background: #b91c1c; border: none; color: white; border-radius: 5px; margin-top: 20px; opacity: 0.8; }
    </style>
</head>
<body>

<div id="info-bar">
    <div>NÍVEL: <span id="level-num">1</span>/15</div>
    <div id="word-display"></div>
    <div id="timer">00:00.00</div>
</div>

<div id="game-container">
    <div id="player">⚡</div>
</div>

<div id="ranking-container">
    <h2>🏆 RANKING DA TURMA</h2>
    <table id="ranking-table">
        <thead><tr><th>Pos</th><th>Nome</th><th>Tempo</th></tr></thead>
        <tbody id="ranking-body"></tbody>
    </table>
    <br>
    <button class="btn-green" onclick="location.reload()">JOGAR NOVAMENTE</button>
    <br>
    <button class="btn-red" onclick="clearRankingPT()">🗑️ LIMPAR RANKING (PARA NOVA TURMA)</button>
</div>

<script>
    const playlist = ["SOL", "BOLA", "CASA", "DADO", "GATO", "LIVRO", "AMIGO", "ESCOLA", "FRUTA", "JARDIM", "ALEGRIA", "ESTUDAR", "PLANETA", "BRINCAR", "CORAGEM"];
    let currentLevel = 0; let collected = ""; let posX = 380; let posY = 230;
    let startTime, timerInterval; let gameActive = true; let isShuffling = false;

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            let diff = Date.now() - startTime;
            let m = Math.floor(diff / 60000).toString().padStart(2, '0');
            let s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            let ms = Math.floor((diff % 1000) / 10).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}.${ms}`;
        }, 50);
    }

    function shuffleLetters() {
        if (isShuffling) return;
        isShuffling = true;
        document.querySelectorAll('.letter').forEach(l => {
            l.classList.add('wrong');
            l.style.left = Math.random() * 740 + 'px';
            l.style.top = Math.random() * 440 + 'px';
            setTimeout(() => { l.classList.remove('wrong'); isShuffling = false; }, 400);
        });
    }

    function initLevel() {
        collected = "";
        const word = playlist[currentLevel];
        document.getElementById('level-num').innerText = currentLevel + 1;
        document.querySelectorAll('.letter').forEach(l => l.remove());
        word.split('').sort(() => Math.random() - 0.5).forEach((char) => {
            const lDiv = document.createElement('div');
            lDiv.className = 'letter';
            lDiv.innerText = char;
            lDiv.style.left = Math.random() * 740 + 'px';
            lDiv.style.top = Math.random() * 440 + 'px';
            document.getElementById('game-container').appendChild(lDiv);
        });
        updateDisplay();
    }

    function updateDisplay() {
        const word = playlist[currentLevel];
        let display = "";
        for(let i=0; i<word.length; i++) { display += (collected[i] || "_") + " "; }
        document.getElementById('word-display').innerText = display;
        if(collected === word) {
            currentLevel++;
            if(currentLevel < playlist.length) initLevel();
            else finishGame();
        }
    }

    function finishGame() {
        gameActive = false;
        clearInterval(timerInterval);
        const finalTime = document.getElementById('timer').innerText;
        setTimeout(() => {
            const nome = prompt("🏆 FIM DE JOGO! Tempo: " + finalTime + "\nDigite seu nome para o Ranking:");
            if(nome) saveRankingPT(nome, finalTime);
            showRankingPT();
        }, 500);
    }

    function saveRankingPT(nome, tempo) {
        let ranking = JSON.parse(localStorage.getItem('ranking_pt_final') || "[]");
        ranking.push({nome, tempo});
        ranking.sort((a, b) => a.tempo.localeCompare(b.tempo));
        localStorage.setItem('ranking_pt_final', JSON.stringify(ranking.slice(0, 5)));
    }

    function showRankingPT() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('ranking-container').style.display = 'block';
        const ranking = JSON.parse(localStorage.getItem('ranking_pt_final') || "[]");
        document.getElementById('ranking-body').innerHTML = ranking.map((r, i) => 
            `<tr><td>${i+1}º</td><td>${r.nome}</td><td>${r.tempo}</td></tr>`).join('');
    }

    function clearRankingPT() {
        if(confirm("Deseja apagar o ranking desta turma?")) {
            localStorage.removeItem('ranking_pt_final');
            showRankingPT();
        }
    }

    document.addEventListener('keydown', (e) => {
        if(!gameActive || isShuffling) return;
        const step = 25;
        if(e.key === 'ArrowUp' && posY > 0) posY -= step;
        if(e.key === 'ArrowDown' && posY < 450) posY += step;
        if(e.key === 'ArrowLeft' && posX > 0) posX -= step;
        if(e.key === 'ArrowRight' && posX < 750) posX += step;
        const p = document.getElementById('player');
        p.style.left = posX + 'px'; p.style.top = posY + 'px';
        const word = playlist[currentLevel];
        document.querySelectorAll('.letter').forEach(l => {
            const lX = parseFloat(l.style.left);
            const lY = parseFloat(l.style.top);
            if(Math.abs(posX - lX) < 40 && Math.abs(posY - lY) < 40) {
                if(l.innerText === word[collected.length]) {
                    collected += l.innerText; l.remove(); updateDisplay();
                } else { shuffleLetters(); }
            }
        });
    });
    startTimer(); initLevel();
</script>
</body>
</html>
